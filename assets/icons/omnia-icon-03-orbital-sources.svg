<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Omnia icon concept 03 - orbital sources</title>
  <desc id="desc">A macOS app icon with three colored source nodes orbiting a central Omnia O.</desc>
  <defs>
    <linearGradient id="bg" x1="150" y1="90" x2="875" y2="935" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#303030"/>
      <stop offset="0.48" stop-color="#111111"/>
      <stop offset="1" stop-color="#040404"/>
    </linearGradient>
    <radialGradient id="center" cx="40%" cy="32%" r="70%">
      <stop offset="0" stop-color="#303030"/>
      <stop offset="0.62" stop-color="#0F0F0F"/>
      <stop offset="1" stop-color="#060606"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="20" stdDeviation="26" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="228" fill="url(#bg)"/>
  <circle cx="512" cy="512" r="330" fill="#0B0B0B" stroke="#FFFFFF" stroke-opacity="0.055" stroke-width="3"/>

  <g fill="none" stroke-linecap="round">
    <ellipse cx="512" cy="512" rx="316" ry="198" transform="rotate(-23 512 512)" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="10"/>
    <ellipse cx="512" cy="512" rx="310" ry="206" transform="rotate(36 512 512)" stroke="#FFFFFF" stroke-opacity="0.095" stroke-width="8"/>
    <ellipse cx="512" cy="512" rx="272" ry="304" transform="rotate(7 512 512)" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="8"/>
  </g>

  <g filter="url(#glow)">
    <path d="M329 344C376 394 423 437 470 473" fill="none" stroke="#1DB954" stroke-width="18" stroke-linecap="round"/>
    <path d="M686 346C642 404 595 445 548 476" fill="none" stroke="#F97316" stroke-width="18" stroke-linecap="round"/>
    <path d="M512 749C512 680 512 621 512 560" fill="none" stroke="#FF0000" stroke-width="18" stroke-linecap="round"/>
  </g>

  <g filter="url(#shadow)">
    <circle cx="512" cy="512" r="166" fill="url(#center)" stroke="#343434" stroke-width="12"/>
    <circle cx="512" cy="512" r="92" fill="none" stroke="#FFFFFF" stroke-width="36"/>
    <circle cx="512" cy="512" r="46" fill="#0E0E0E"/>
  </g>

  <g filter="url(#glow)">
    <circle cx="299" cy="312" r="55" fill="#1DB954"/>
    <circle cx="727" cy="302" r="55" fill="#F97316"/>
    <circle cx="512" cy="792" r="55" fill="#FF0000"/>
  </g>
  <g fill="#FFFFFF" opacity="0.32">
    <circle cx="279" cy="292" r="13"/>
    <circle cx="707" cy="282" r="13"/>
    <circle cx="492" cy="772" r="13"/>
  </g>

  <path d="M486 468C486 453 503 444 516 452L587 495C600 503 600 521 587 529L516 572C503 580 486 571 486 556V468Z" fill="#FFFFFF"/>
</svg>
