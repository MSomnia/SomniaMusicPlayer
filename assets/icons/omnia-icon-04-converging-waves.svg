<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Omnia icon concept 04 - converging waves</title>
  <desc id="desc">A macOS app icon with three colored music waves flowing into one white playback mark.</desc>
  <defs>
    <linearGradient id="bg" x1="140" y1="70" x2="885" y2="955" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2C2C2C"/>
      <stop offset="0.52" stop-color="#101010"/>
      <stop offset="1" stop-color="#040404"/>
    </linearGradient>
    <linearGradient id="plate" x1="316" y1="284" x2="820" y2="740" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#242424"/>
      <stop offset="1" stop-color="#090909"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#000000" flood-opacity="0.48"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="228" fill="url(#bg)"/>
  <path d="M160 208C238 140 770 140 850 208C928 275 928 749 850 816C770 884 238 884 160 816C82 749 82 275 160 208Z" fill="none" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="4"/>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <path d="M154 337C234 272 297 271 356 335C414 398 456 471 565 492" stroke="#1DB954" stroke-width="58"/>
    <path d="M138 510C229 469 309 477 371 522C442 574 484 583 565 521" stroke="#F97316" stroke-width="58"/>
    <path d="M156 687C246 745 320 731 377 666C437 597 484 555 565 548" stroke="#FF0000" stroke-width="58"/>
  </g>

  <g opacity="0.38" fill="none" stroke="#FFFFFF" stroke-linecap="round">
    <path d="M202 341C250 312 292 322 330 364" stroke-width="8"/>
    <path d="M198 516C248 502 291 511 333 542" stroke-width="8"/>
    <path d="M204 680C256 707 299 694 337 653" stroke-width="8"/>
  </g>

  <g filter="url(#shadow)">
    <circle cx="646" cy="512" r="178" fill="url(#plate)" stroke="#343434" stroke-width="12"/>
    <circle cx="646" cy="512" r="112" fill="#0C0C0C" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="4"/>
    <path d="M599 414C599 386 631 369 655 383L782 462C805 477 805 511 782 526L655 605C631 619 599 602 599 574V414Z" fill="#FFFFFF"/>
  </g>

  <circle cx="646" cy="512" r="230" fill="none" stroke="#FFFFFF" stroke-opacity="0.055" stroke-width="3"/>
</svg>
