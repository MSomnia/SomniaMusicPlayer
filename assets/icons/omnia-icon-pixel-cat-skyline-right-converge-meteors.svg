<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" shape-rendering="crispEdges" role="img" aria-labelledby="title desc">
  <title id="title">Omnia pixel cat skyline icon with right-side meteor convergence</title>
  <desc id="desc">A pixel style macOS icon in black, white, and gray with a pixel cat, distant skyline, and three colored meteors entering from the far left and converging near the right edge.</desc>

  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111111"/>
      <stop offset="0.56" stop-color="#1A1A1A"/>
      <stop offset="1" stop-color="#070707"/>
    </linearGradient>
    <filter id="iconShadow" x="-20%" y="-20%" width="140%" height="145%">
      <feDropShadow dx="0" dy="28" stdDeviation="18" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- macOS icon tile -->
  <rect width="1024" height="1024" rx="224" fill="#050505"/>
  <g filter="url(#iconShadow)">
    <rect x="64" y="64" width="896" height="896" rx="176" fill="url(#sky)"/>
  </g>

  <!-- pixel stars -->
  <g fill="#E7E7E7" opacity="0.8">
    <rect x="192" y="176" width="12" height="12"/>
    <rect x="320" y="116" width="8" height="8"/>
    <rect x="748" y="156" width="12" height="12"/>
    <rect x="836" y="260" width="8" height="8"/>
    <rect x="134" y="318" width="8" height="8"/>
    <rect x="608" y="104" width="8" height="8"/>
  </g>

  <!-- far-left to right-edge converging meteors -->
  <g>
    <rect x="72" y="178" width="14" height="14" fill="#1DB954" opacity="0.22"/>
    <rect x="116" y="188" width="18" height="18" fill="#1DB954" opacity="0.42"/>
    <rect x="164" y="198" width="28" height="28" fill="#1DB954"/>
    <rect x="232" y="212" width="28" height="28" fill="#1DB954"/>
    <rect x="300" y="226" width="28" height="28" fill="#1DB954"/>
    <rect x="368" y="240" width="28" height="28" fill="#1DB954"/>
    <rect x="436" y="254" width="28" height="28" fill="#1DB954"/>
    <rect x="504" y="268" width="28" height="28" fill="#1DB954"/>
    <rect x="572" y="282" width="28" height="28" fill="#1DB954"/>
    <rect x="640" y="296" width="28" height="28" fill="#1DB954"/>
    <rect x="708" y="310" width="28" height="28" fill="#1DB954"/>

    <rect x="72" y="316" width="14" height="14" fill="#F97316" opacity="0.22"/>
    <rect x="116" y="316" width="18" height="18" fill="#F97316" opacity="0.42"/>
    <rect x="164" y="316" width="28" height="28" fill="#F97316"/>
    <rect x="232" y="316" width="28" height="28" fill="#F97316"/>
    <rect x="300" y="316" width="28" height="28" fill="#F97316"/>
    <rect x="368" y="316" width="28" height="28" fill="#F97316"/>
    <rect x="436" y="316" width="28" height="28" fill="#F97316"/>
    <rect x="504" y="316" width="28" height="28" fill="#F97316"/>
    <rect x="572" y="316" width="28" height="28" fill="#F97316"/>
    <rect x="640" y="316" width="28" height="28" fill="#F97316"/>
    <rect x="708" y="316" width="28" height="28" fill="#F97316"/>

    <rect x="72" y="454" width="14" height="14" fill="#FF0000" opacity="0.22"/>
    <rect x="116" y="444" width="18" height="18" fill="#FF0000" opacity="0.42"/>
    <rect x="164" y="434" width="28" height="28" fill="#FF0000"/>
    <rect x="232" y="420" width="28" height="28" fill="#FF0000"/>
    <rect x="300" y="406" width="28" height="28" fill="#FF0000"/>
    <rect x="368" y="392" width="28" height="28" fill="#FF0000"/>
    <rect x="436" y="378" width="28" height="28" fill="#FF0000"/>
    <rect x="504" y="364" width="28" height="28" fill="#FF0000"/>
    <rect x="572" y="350" width="28" height="28" fill="#FF0000"/>
    <rect x="640" y="336" width="28" height="28" fill="#FF0000"/>
    <rect x="708" y="322" width="28" height="28" fill="#FF0000"/>

    <rect x="764" y="288" width="84" height="84" fill="#F0F0F0"/>
    <rect x="736" y="316" width="28" height="28" fill="#CFCFCF"/>
    <rect x="848" y="316" width="28" height="28" fill="#CFCFCF"/>
    <rect x="792" y="316" width="28" height="28" fill="#FFFFFF"/>
  </g>

  <!-- skyline haze -->
  <rect x="96" y="538" width="832" height="28" fill="#2A2A2A"/>
  <rect x="96" y="566" width="832" height="28" fill="#202020"/>

  <!-- distant pixel skyline -->
  <g fill="#353535">
    <rect x="112" y="454" width="56" height="140"/>
    <rect x="180" y="398" width="72" height="196"/>
    <rect x="264" y="482" width="56" height="112"/>
    <rect x="332" y="426" width="88" height="168"/>
    <rect x="432" y="370" width="64" height="224"/>
    <rect x="508" y="454" width="76" height="140"/>
    <rect x="596" y="406" width="64" height="188"/>
    <rect x="672" y="342" width="88" height="252"/>
    <rect x="772" y="450" width="56" height="144"/>
    <rect x="840" y="390" width="72" height="204"/>
  </g>
  <g fill="#BDBDBD" opacity="0.78">
    <rect x="132" y="482" width="12" height="12"/>
    <rect x="204" y="430" width="12" height="12"/>
    <rect x="232" y="486" width="12" height="12"/>
    <rect x="356" y="458" width="12" height="12"/>
    <rect x="384" y="514" width="12" height="12"/>
    <rect x="456" y="402" width="12" height="12"/>
    <rect x="456" y="458" width="12" height="12"/>
    <rect x="532" y="486" width="12" height="12"/>
    <rect x="620" y="438" width="12" height="12"/>
    <rect x="696" y="374" width="12" height="12"/>
    <rect x="724" y="430" width="12" height="12"/>
    <rect x="792" y="482" width="12" height="12"/>
    <rect x="864" y="422" width="12" height="12"/>
    <rect x="892" y="506" width="12" height="12"/>
  </g>

  <!-- foreground ledge -->
  <rect x="96" y="594" width="832" height="56" fill="#111111"/>
  <rect x="96" y="650" width="832" height="34" fill="#2E2E2E"/>
  <rect x="96" y="684" width="832" height="16" fill="#080808"/>

  <!-- pixel cat silhouette -->
  <g>
    <!-- tail -->
    <rect x="692" y="704" width="44" height="44" fill="#E7E7E7"/>
    <rect x="736" y="676" width="44" height="44" fill="#E7E7E7"/>
    <rect x="780" y="676" width="28" height="44" fill="#E7E7E7"/>
    <rect x="808" y="704" width="28" height="44" fill="#E7E7E7"/>
    <rect x="780" y="720" width="28" height="28" fill="#080808"/>

    <!-- body -->
    <rect x="364" y="640" width="304" height="184" fill="#E7E7E7"/>
    <rect x="336" y="684" width="56" height="140" fill="#E7E7E7"/>
    <rect x="640" y="684" width="56" height="140" fill="#E7E7E7"/>

    <!-- head -->
    <rect x="392" y="512" width="240" height="172" fill="#F2F2F2"/>
    <rect x="420" y="484" width="52" height="52" fill="#F2F2F2"/>
    <rect x="552" y="484" width="52" height="52" fill="#F2F2F2"/>
    <rect x="392" y="536" width="28" height="56" fill="#F2F2F2"/>
    <rect x="604" y="536" width="28" height="56" fill="#F2F2F2"/>

    <!-- ear inner shadow -->
    <rect x="436" y="512" width="24" height="24" fill="#9E9E9E"/>
    <rect x="564" y="512" width="24" height="24" fill="#9E9E9E"/>

    <!-- face -->
    <rect x="444" y="584" width="28" height="28" fill="#080808"/>
    <rect x="552" y="584" width="28" height="28" fill="#080808"/>
    <rect x="500" y="624" width="24" height="20" fill="#080808"/>
    <rect x="476" y="656" width="24" height="12" fill="#080808"/>
    <rect x="524" y="656" width="24" height="12" fill="#080808"/>

    <!-- chest and paws -->
    <rect x="456" y="684" width="112" height="140" fill="#CFCFCF"/>
    <rect x="380" y="796" width="80" height="44" fill="#F2F2F2"/>
    <rect x="564" y="796" width="80" height="44" fill="#F2F2F2"/>
    <rect x="404" y="824" width="24" height="16" fill="#9E9E9E"/>
    <rect x="596" y="824" width="24" height="16" fill="#9E9E9E"/>

    <!-- outline pixels -->
    <rect x="392" y="484" width="28" height="28" fill="#080808"/>
    <rect x="604" y="484" width="28" height="28" fill="#080808"/>
    <rect x="364" y="540" width="28" height="120" fill="#080808"/>
    <rect x="632" y="540" width="28" height="120" fill="#080808"/>
    <rect x="336" y="640" width="28" height="44" fill="#080808"/>
    <rect x="668" y="640" width="28" height="44" fill="#080808"/>
    <rect x="336" y="824" width="360" height="28" fill="#080808"/>
    <rect x="364" y="612" width="28" height="28" fill="#080808"/>
    <rect x="632" y="612" width="28" height="28" fill="#080808"/>
  </g>

  <!-- subtle pixel frame highlight -->
  <g opacity="0.18">
    <rect x="176" y="96" width="672" height="8" fill="#FFFFFF"/>
    <rect x="96" y="176" width="8" height="520" fill="#FFFFFF"/>
    <rect x="848" y="920" width="8" height="8" fill="#FFFFFF"/>
  </g>
</svg>
