<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Omnia icon concept 01 - sound wave O</title>
  <desc id="desc">A macOS app icon with a black rounded square and an O formed from three colored sound wave arcs.</desc>
  <defs>
    <linearGradient id="bg" x1="180" y1="80" x2="844" y2="944" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2A2A2A"/>
      <stop offset="0.48" stop-color="#101010"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="38%" r="62%">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.12"/>
      <stop offset="0.42" stop-color="#FFFFFF" stop-opacity="0.03"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="228" fill="url(#bg)"/>
  <rect x="34" y="30" width="956" height="956" rx="210" fill="url(#glow)"/>
  <path d="M188 118C260 62 756 62 836 118C920 177 956 328 950 512C944 696 900 848 818 906C738 962 280 962 202 906C120 848 74 696 74 512C74 328 106 177 188 118Z" fill="none" stroke="#FFFFFF" stroke-opacity="0.055" stroke-width="4"/>

  <g filter="url(#shadow)">
    <circle cx="512" cy="512" r="222" fill="#090909" stroke="#2A2A2A" stroke-width="18"/>
    <circle cx="512" cy="512" r="154" fill="#101010" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="2"/>
  </g>

  <g fill="none" stroke-linecap="round" filter="url(#softGlow)">
    <path d="M508 196C382 198 279 277 237 389C191 510 232 647 335 721C396 765 470 782 539 772" stroke="#1DB954" stroke-width="72"/>
    <path d="M548 198C675 214 773 303 805 424C840 560 772 698 650 753" stroke="#F97316" stroke-width="72"/>
    <path d="M285 757C365 835 487 868 604 836C704 808 783 731 816 634" stroke="#FF0000" stroke-width="72"/>
  </g>

  <g opacity="0.34" fill="none" stroke="#FFFFFF" stroke-linecap="round">
    <path d="M321 314C378 259 457 234 535 244" stroke-width="10"/>
    <path d="M707 328C752 390 768 467 752 537" stroke-width="10"/>
  </g>

  <path d="M468 420C468 401 489 390 505 400L631 476C647 486 647 510 631 520L505 596C489 606 468 595 468 576V420Z" fill="#FFFFFF"/>
  <path d="M468 420C468 401 489 390 505 400L631 476C647 486 647 510 631 520L505 596C489 606 468 595 468 576V420Z" fill="#FFFFFF" opacity="0.18" filter="url(#softGlow)"/>
</svg>
